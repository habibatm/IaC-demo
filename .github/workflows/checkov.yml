name: IaC Security Scan - Checkov

on:
  workflow_dispatch:
    inputs:
      scan_path:
        description: Folder to scan
        required: true
        default: vulnerable
        type: choice
        options:
          - vulnerable
          - improved
      soft_fail:
        description: Report-only mode. Use true for demo, false to fail the build on findings.
        required: true
        default: true
        type: boolean
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checkov:
    name: Checkov Terraform scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Checkov
        run: |
          python -m pip install --upgrade pip
          pip install checkov

      - name: Run Checkov
        env:
          INPUT_SCAN_PATH: ${{ github.event.inputs.scan_path }}
          INPUT_SOFT_FAIL: ${{ github.event.inputs.soft_fail }}
        run: |
          SCAN_PATH="${INPUT_SCAN_PATH:-vulnerable}"
          SOFT_FAIL="${INPUT_SOFT_FAIL:-false}"

          echo "Scanning folder: ${SCAN_PATH}"
          echo "Soft fail mode: ${SOFT_FAIL}"

          CHECKOV_ARGS="-d ${SCAN_PATH} --framework terraform --output cli --output json --output-file-path console,checkov-results.json"
          if [ "${SOFT_FAIL}" = "true" ]; then
            CHECKOV_ARGS="${CHECKOV_ARGS} --soft-fail"
          fi

          checkov ${CHECKOV_ARGS}

      - name: Upload Checkov JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-results
          path: checkov-results.json
