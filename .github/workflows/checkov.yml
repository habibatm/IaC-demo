name: IaC Security Scan - Checkov

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      scan_path:
        description: Folder to scan
        required: true
        default: vulnerable
        type: choice
        options:
          - vulnerable
          - improved
          - .
      enforce_gate:
        description: Fail workflow if Checkov finds failed checks
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  checkov:
    name: Checkov Terraform scan
    runs-on: ubuntu-latest

    steps:
      - name: Resolve scan settings
        id: settings
        shell: bash
        run: |
          SCAN_PATH="${{ github.event.inputs.scan_path }}"
          ENFORCE_GATE="${{ github.event.inputs.enforce_gate }}"

          if [ -z "$SCAN_PATH" ]; then
            SCAN_PATH="vulnerable"
          fi

          if [ -z "$ENFORCE_GATE" ]; then
            ENFORCE_GATE="false"
          fi

          echo "scan_path=$SCAN_PATH" >> "$GITHUB_OUTPUT"
          echo "enforce_gate=$ENFORCE_GATE" >> "$GITHUB_OUTPUT"

          echo "Scan path: $SCAN_PATH"
          echo "Enforce gate: $ENFORCE_GATE"

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Checkov
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install checkov
          checkov --version

      - name: Run Checkov and generate reports
        id: checkov
        shell: bash
        run: |
          set -e
          mkdir -p reports
          SCAN_PATH="${{ steps.settings.outputs.scan_path }}"

          echo "Scanning: $SCAN_PATH"

          # Soft-fail here so the reporting, SARIF upload, and artifact upload always happen.
          checkov -d "$SCAN_PATH" --framework terraform --output json --soft-fail > reports/checkov-results.json
          checkov -d "$SCAN_PATH" --framework terraform --output sarif --soft-fail > reports/checkov-results.sarif
          checkov -d "$SCAN_PATH" --framework terraform --soft-fail | tee reports/checkov-output.txt

          python scripts/checkov_to_markdown.py \
            --input reports/checkov-results.json \
            --output reports/checkov-summary.md \
            --scan-path "$SCAN_PATH" \
            --annotations > reports/checkov-annotations.log

      - name: Create GitHub Actions summary and inline annotations
        if: always()
        shell: bash
        run: |
          if [ -f reports/checkov-summary.md ]; then
            cat reports/checkov-summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "# Checkov IaC Security Report"
              echo ""
              echo "No Checkov JSON result file was found. Check the workflow logs for scan failures."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -f reports/checkov-annotations.log ]; then
            cat reports/checkov-annotations.log
          fi

      - name: Upload SARIF to GitHub code scanning
        if: always() && hashFiles('reports/checkov-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: reports/checkov-results.sarif
          category: checkov-${{ steps.settings.outputs.scan_path }}

      - name: Upload Checkov report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: checkov-results-${{ steps.settings.outputs.scan_path }}-run-${{ github.run_number }}-${{ github.run_attempt }}
          path: reports/
          if-no-files-found: warn
          retention-days: 30

      - name: Enforce Checkov security gate
        if: always()
        shell: bash
        env:
          ENFORCE_GATE: ${{ steps.settings.outputs.enforce_gate }}
        run: |
          if [ ! -f reports/checkov-results.json ]; then
            echo "::warning::No Checkov JSON result file found. Skipping gate enforcement."
            exit 0
          fi

          FAILED_COUNT="$(python -c 'import json, pathlib; p=pathlib.Path("reports/checkov-results.json"); print(json.loads(p.read_text()).get("summary", {}).get("failed", 0))')"

          echo "Failed checks: ${FAILED_COUNT}"
          echo "Gate enforcement: ${ENFORCE_GATE}"

          if [ "${ENFORCE_GATE}" = "true" ] && [ "${FAILED_COUNT}" -gt 0 ]; then
            echo "::error::Checkov security gate failed with ${FAILED_COUNT} failed checks."
            exit 1
          fi

          echo "Checkov report generated successfully! Gate did not block this run."